# Direct adaptation of dynamo's kvbm-kernel-cuda-tests.yml for the standalone
# repo. Builds + runs the kvbm-kernels CUDA tests across the 12.8 / 12.9 / 13.0
# toolchains in their respective devel containers (needs a GPU at runtime).
#
# Changes vs the dynamo original:
#   * path filter  lib/kvbm-kernels/**            -> crates/kvbm-kernels/**
#   * self-ref     .github/workflows/kvbm-cuda-tests.yml
#                                                  -> .github/.../kvbm-kernels-cuda.yml
#   * in-container cd /tmp/build/lib/kvbm-kernels  -> /tmp/build/crates/kvbm-kernels

name: kvbm-kernels CUDA Tests

on:
  push:
    branches:
      - main
      - release/*.*.*
    paths:
      - 'crates/kvbm-kernels/**'
      - '.github/workflows/kvbm-kernels-cuda.yml'
  pull_request:
    paths:
      - 'crates/kvbm-kernels/**'
      - '.github/workflows/kvbm-kernels-cuda.yml'

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cuda-test:
    name: CUDA ${{ matrix.cuda_version }}
    # TODO(human): confirm this self-hosted GPU runner label is registered for
    # the standalone kvbm repo (it came from the dynamo monorepo and may not be
    # attached here). Replace with the kvbm repo's provisioned GPU runner.
    runs-on: prod-tester-amd-gpu-v1
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: "12.8"
            cuda_image: nvidia/cuda:12.8.1-devel-ubuntu24.04
          - cuda_version: "12.9"
            cuda_image: nvidia/cuda:12.9.0-devel-ubuntu24.04
          - cuda_version: "13.0"
            cuda_image: nvidia/cuda:13.0.0-devel-ubuntu24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build and test in CUDA ${{ matrix.cuda_version }} container
        run: |
          docker run --rm --gpus all \
            -v "${{ github.workspace }}:/workspace:ro" \
            ${{ matrix.cuda_image }} \
            bash -c '
              set -euo pipefail

              # Install build dependencies
              apt-get update -qq && apt-get install -y -qq curl build-essential pkg-config > /dev/null

              # Install Rust via rustup
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source "$HOME/.cargo/env"

              # Report versions
              nvcc --version
              rustc --version
              cargo --version

              # Copy source to writable location (workspace is ro-mounted)
              cp -a /workspace /tmp/build
              cd /tmp/build/crates/kvbm-kernels

              # Build tests (auto-detects CUDA version from nvcc)
              echo "::group::cargo test --no-run"
              cargo test --all-features -p kvbm-kernels --no-run 2>&1
              echo "::endgroup::"

              # Run tests
              echo "::group::cargo test"
              cargo test --all-features -p kvbm-kernels -- --nocapture 2>&1
              echo "::endgroup::"
            '

  status-check:
    name: kvbm-kernels CUDA Status
    runs-on: ubuntu-latest
    needs: [cuda-test]
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          echo '${{ toJson(needs) }}' | jq -e 'to_entries | map(.value.result) | all(. == "success")'
